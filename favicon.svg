<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="#05050f"/>
  <rect width="64" height="64" rx="14" fill="url(#g)" opacity="0.15"/>
  <!-- Waveform bars (centered, gradient fill) -->
  <rect x="8"  y="26" width="6" height="12" rx="3" fill="url(#g)" filter="url(#glow)"/>
  <rect x="17" y="20" width="6" height="24" rx="3" fill="url(#g)" filter="url(#glow)"/>
  <rect x="26" y="12" width="6" height="40" rx="3" fill="url(#g)" filter="url(#glow)"/>
  <rect x="35" y="18" width="6" height="28" rx="3" fill="url(#g)" filter="url(#glow)"/>
  <rect x="44" y="24" width="6" height="16" rx="3" fill="url(#g)" filter="url(#glow)"/>
  <rect x="53" y="28" width="5" height="8"  rx="2.5" fill="url(#g)" filter="url(#glow)"/>
</svg>
